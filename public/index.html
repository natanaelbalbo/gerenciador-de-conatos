<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Manager | Premium API</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <meta name="description"
        content="Sistema premium para gerenciamento de contatos com validação de idade e regras de negócio avançadas.">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <header class="glass-panel main-header">
            <h1>Gerenciador de <span>Contatos</span></h1>
            <p>Arquitetura SOLID & Node.js Backend</p>
        </header>

        <section class="grid">
            <aside class="glass-panel contact-form-panel">
                <h2>Novo Contato</h2>
                <form id="contactForm">
                    <div class="form-group">
                        <label for="name">Nome Completo</label>
                        <input type="text" id="name" name="name" placeholder="Ex: João Silva" required>
                    </div>
                    <div class="form-group">
                        <label for="birthDate">Data de Nascimento</label>
                        <input type="date" id="birthDate" name="birthDate" required>
                    </div>
                    <div class="form-group">
                        <label for="gender">Sexo</label>
                        <select id="gender" name="gender" required>
                            <option value="">Selecione...</option>
                            <option value="Masculino">Masculino</option>
                            <option value="Feminino">Feminino</option>
                            <option value="Outro">Outro</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Criar Contato</button>
                </form>
                <div id="message" class="message"></div>
            </aside>

            <section class="glass-panel contact-list-panel">
                <div class="list-header">
                    <h2>Meus Contatos</h2>
                    <span id="contactCount" class="badge">0 Contatos</span>
                </div>
                <div id="contactList" class="contact-list">
                    <div class="loading">Carregando contatos...</div>
                </div>
            </section>
        </section>
    </main>

    <div id="detailModal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close-btn">&times;</span>
            <h2>Detalhes do Contato</h2>
            <div id="contactDetails"></div>
            <div class="modal-actions">
                <button id="deactivateBtn" class="btn-warn">Desativar</button>
                <button id="deleteBtn" class="btn-danger">Excluir</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
